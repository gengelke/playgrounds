# =========================================
# MUTATION: Add Employee
# =========================================

mutation AddEmployee(
  $employeeId: Int!
  $name: String!
  $surname: String!
  $description: String!
) {
  addEmployee(
    employeeId: $employeeId
    name: $name
    surname: $surname
    description: $description
  )
}


# =========================================
# MUTATION: Update Employee
# =========================================

mutation UpdateEmployee(
  $employeeId: Int!
  $name: String!
  $surname: String!
  $description: String!
) {
  updateEmployee(
    employeeId: $employeeId
    name: $name
    surname: $surname
    description: $description
  )
}


# =========================================
# MUTATION: Delete Employee
# =========================================

mutation DeleteEmployee(
  $employeeId: Int!
) {
  deleteEmployee(employeeId: $employeeId)
}
